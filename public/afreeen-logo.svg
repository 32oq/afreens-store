<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.1"/>
  
  <!-- Decorative flourish - top -->
  <path d="M 60 50 Q 100 30 140 50" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Main calligraphy letter "A" -->
  <path d="M 70 160 L 100 60 L 130 160" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="80" y1="120" x2="120" y2="120" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Decorative dot with flourish -->
  <circle cx="145" cy="75" r="3" fill="#d4af37"/>
  <path d="M 148 75 Q 155 70 160 75" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Decorative flourish - bottom -->
  <path d="M 60 170 Q 100 185 140 170" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Corner decorative elements -->
  <circle cx="50" cy="50" r="2" fill="#d4af37" opacity="0.7"/>
  <circle cx="150" cy="50" r="2" fill="#d4af37" opacity="0.7"/>
  <circle cx="50" cy="150" r="2" fill="#d4af37" opacity="0.7"/>
  <circle cx="150" cy="150" r="2" fill="#d4af37" opacity="0.7"/>
</svg>
